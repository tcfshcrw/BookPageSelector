<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Page Selector</title>
    <style>
:root {
    --bg-primary: #0f172a;
    --bg-secondary: #1e293b;
    --accent-primary: #3b82f6;
    --accent-hover: #2563eb;
    --text-primary: #f8fafc;
    --text-secondary: #cbd5e1;
    --danger: #ef4444;
    --danger-hover: #dc2626;
    --glass-bg: rgba(30, 41, 59, 0.7);
    --glass-border: rgba(255, 255, 255, 0.1);
    --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Outfit', sans-serif;
    background-color: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    background-image: 
        radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
        radial-gradient(at 50% 0%, hsla(225,39%,30%,0.5) 0, transparent 50%), 
        radial-gradient(at 100% 0%, hsla(339,49%,30%,0.5) 0, transparent 50%);
    background-attachment: fixed;
}

.app-container {
    width: 100%;
    max-width: 600px;
    padding: 2rem 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 2rem;
}

header {
    text-align: center;
    margin-bottom: 1rem;
    animation: fadeInDown 0.8s ease-out;
}

header h1 {
    font-weight: 800;
    font-size: 2.5rem;
    background: linear-gradient(to right, #60a5fa, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 0.5rem;
}

header p {
    color: var(--text-secondary);
    font-size: 1.1rem;
}

.glass-card {
    background: var(--glass-bg);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--glass-border);
    border-radius: 1.5rem;
    padding: 2rem;
    box-shadow: var(--glass-shadow);
    animation: fadeInUp 0.8s ease-out;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.glass-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.4);
}

/* Result Area */
.result-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 1.5rem;
}

.page-display {
    font-size: 6rem;
    font-weight: 800;
    line-height: 1;
    color: #fff;
    text-shadow: 0 0 20px rgba(59, 130, 246, 0.5);
    min-height: 6rem;
    transition: all 0.3s ease;
}

.page-display.animating {
    transform: scale(1.1);
    color: var(--accent-primary);
    filter: blur(2px);
}

.result-label {
    color: var(--text-secondary);
    font-size: 1.2rem;
    height: 1.5rem;
}

/* Controls */
.controls-container h2, .data-container h2 {
    font-size: 1.5rem;
    margin-bottom: 1.5rem;
    font-weight: 600;
    color: #fff;
}

.select-wrapper {
    position: relative;
    margin-bottom: 1.5rem;
}

select, input {
    width: 100%;
    padding: 1rem 1.2rem;
    border-radius: 0.8rem;
    border: 1px solid var(--glass-border);
    background: rgba(15, 23, 42, 0.6);
    color: var(--text-primary);
    font-family: inherit;
    font-size: 1rem;
    transition: all 0.3s ease;
    outline: none;
}

select:focus, input:focus {
    border-color: var(--accent-primary);
    box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.3);
}

select {
    appearance: none;
    cursor: pointer;
}

.select-wrapper::after {
    content: '▼';
    position: absolute;
    right: 1.2rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-secondary);
    pointer-events: none;
    font-size: 0.8rem;
}

select option {
    background: var(--bg-secondary);
    color: var(--text-primary);
}

.book-form {
    display: flex;
    flex-direction: column;
    gap: 1rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--glass-border);
}

/* Buttons */
button {
    font-family: inherit;
    font-size: 1rem;
    font-weight: 600;
    border: none;
    border-radius: 0.8rem;
    cursor: pointer;
    transition: all 0.3s ease;
    padding: 1rem 1.5rem;
    outline: none;
}

button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none !important;
}

.primary-btn {
    background: linear-gradient(135deg, var(--accent-primary), #8b5cf6);
    color: white;
    width: 100%;
    font-size: 1.2rem;
    padding: 1.2rem;
    border-radius: 1rem;
    box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
}

.primary-btn:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(59, 130, 246, 0.6);
}

.primary-btn:active:not(:disabled) {
    transform: translateY(1px);
}

.form-actions {
    display: flex;
    gap: 0.8rem;
}

.action-btn {
    flex: 1;
    background: var(--accent-primary);
    color: white;
}

.action-btn:hover { background: var(--accent-hover); }

.action-btn.secondary {
    background: transparent;
    border: 1px solid var(--text-secondary);
    color: var(--text-primary);
}

.action-btn.secondary:hover {
    background: rgba(255, 255, 255, 0.1);
}

.action-btn.danger {
    background: var(--danger);
}

.action-btn.danger:hover {
    background: var(--danger-hover);
}

/* Data Container */
.data-actions {
    display: flex;
    gap: 1rem;
}

.data-btn, .import-label {
    flex: 1;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid var(--glass-border);
    color: var(--text-primary);
    padding: 1rem;
    border-radius: 0.8rem;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s ease;
    font-size: 1rem;
    font-weight: 600;
    display: block;
}

.data-btn:hover, .import-label:hover {
    background: rgba(255, 255, 255, 0.1);
}

.hidden {
    display: none !important;
}

/* Toast */
.toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: rgba(15, 23, 42, 0.9);
    backdrop-filter: blur(8px);
    color: white;
    padding: 1rem 2rem;
    border-radius: 2rem;
    border: 1px solid var(--glass-border);
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    z-index: 1000;
    transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    font-weight: 500;
}

.toast.show {
    transform: translateX(-50%) translateY(0);
}

footer {
    text-align: center;
    color: var(--text-secondary);
    font-size: 0.9rem;
    margin-top: auto;
    padding-top: 2rem;
}

/* Animations */
@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@keyframes fadeInDown {
    from {
        opacity: 0;
        transform: translateY(-20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.pulse-anim {
    animation: pulse 2s infinite;
}

@keyframes pulse {
    0% {
        box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.4);
    }
    70% {
        box-shadow: 0 0 0 15px rgba(59, 130, 246, 0);
    }
    100% {
        box-shadow: 0 0 0 0 rgba(59, 130, 246, 0);
    }
}

</style>
    <meta name="theme-color" content="#1a1a2e">
    <!-- Google Fonts for typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>📚 Page Selector</h1>
            <p>Pick your next adventure</p>
        </header>

        <main>
            <div class="glass-card result-container">
                <div class="page-display" id="pageDisplay">--</div>
                <div class="result-label" id="resultLabel">Ready to read?</div>
                <button id="pickPageBtn" class="primary-btn pulse-anim" disabled>Pick Page</button>
            </div>

            <div class="glass-card controls-container">
                <h2>Manage Books</h2>
                <div class="select-wrapper">
                    <select id="bookSelect" aria-label="Select a book">
                        <option value="" disabled selected>Select a book...</option>
                    </select>
                </div>
                
                <form id="bookForm" class="book-form">
                    <input type="hidden" id="bookId">
                    <div class="input-group">
                        <input type="text" id="bookName" placeholder="Book Name" required>
                    </div>
                    <div class="input-group">
                        <input type="number" id="bookPages" placeholder="Total Pages" min="1" required>
                    </div>
                    <div class="form-actions">
                        <button type="submit" id="saveBookBtn" class="action-btn">Save Book</button>
                        <button type="button" id="cancelEditBtn" class="action-btn secondary hidden">Cancel</button>
                        <button type="button" id="deleteBookBtn" class="action-btn danger hidden">Delete</button>
                    </div>
                </form>
            </div>

            <div class="glass-card data-container">
                <h2>Data Options</h2>
                <div class="data-actions">
                    <button id="exportBtn" class="data-btn">📤 Export JSON</button>
                    <label for="importFile" class="data-btn import-label">📥 Import JSON</label>
                    <input type="file" id="importFile" accept=".json" class="hidden">
                </div>
            </div>
        </main>
        
        <footer>
            <p>Book Page Selector PWA - v26.28.07</p>
        </footer>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast hidden">Notification message</div>

    <script>
document.addEventListener('DOMContentLoaded', () => {
    // --- State ---
    const STORAGE_KEY = 'bookPageSelectorData';
    let books = [];
    let currentBookId = null;

    // --- DOM Elements ---
    const bookSelect = document.getElementById('bookSelect');
    const bookForm = document.getElementById('bookForm');
    const bookIdInput = document.getElementById('bookId');
    const bookNameInput = document.getElementById('bookName');
    const bookPagesInput = document.getElementById('bookPages');
    
    const saveBookBtn = document.getElementById('saveBookBtn');
    const cancelEditBtn = document.getElementById('cancelEditBtn');
    const deleteBookBtn = document.getElementById('deleteBookBtn');
    
    const pageDisplay = document.getElementById('pageDisplay');
    const resultLabel = document.getElementById('resultLabel');
    const pickPageBtn = document.getElementById('pickPageBtn');
    
    const exportBtn = document.getElementById('exportBtn');
    const importFile = document.getElementById('importFile');
    const toast = document.getElementById('toast');

    // --- Initialization ---
    init();

    function init() {
        loadData();
        renderSelect();
        setupEventListeners();
        unregisterServiceWorker();
    }

    // --- Core Functions ---
    function loadData() {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (stored) {
            try {
                books = JSON.parse(stored);
            } catch (e) {
                console.error("Failed to parse stored data", e);
                books = [];
            }
        }
    }

    function saveData() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(books));
    }

    function renderSelect() {
        // Clear except first option
        bookSelect.innerHTML = '<option value="" disabled selected>Select a book...</option>';
        
        books.forEach(book => {
            const option = document.createElement('option');
            option.value = book.id;
            option.textContent = `${book.name} (${book.pages} pages)`;
            bookSelect.appendChild(option);
        });

        if (currentBookId && books.find(b => b.id === currentBookId)) {
            bookSelect.value = currentBookId;
            pickPageBtn.disabled = false;
            pickPageBtn.classList.add('pulse-anim');
        } else {
            bookSelect.value = '';
            pickPageBtn.disabled = true;
            pickPageBtn.classList.remove('pulse-anim');
            resetDisplay();
        }
    }

    function resetForm() {
        bookIdInput.value = '';
        bookNameInput.value = '';
        bookPagesInput.value = '';
        saveBookBtn.textContent = 'Save Book';
        cancelEditBtn.classList.add('hidden');
        deleteBookBtn.classList.add('hidden');
    }

    function resetDisplay() {
        pageDisplay.textContent = '--';
        resultLabel.textContent = 'Ready to read?';
    }

    function showToast(message, duration = 3000) {
        toast.textContent = message;
        toast.classList.remove('hidden');
        
        // Trigger reflow
        void toast.offsetWidth;
        
        toast.classList.add('show');
        
        setTimeout(() => {
            toast.classList.remove('show');
            setTimeout(() => toast.classList.add('hidden'), 400); // match transition duration
        }, duration);
    }

    // --- Event Listeners ---
    function setupEventListeners() {
        // Form Submit (Add/Edit)
        bookForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const id = bookIdInput.value;
            const name = bookNameInput.value.trim();
            const pages = parseInt(bookPagesInput.value, 10);

            if (!name || isNaN(pages) || pages < 1) {
                showToast("Please enter valid book details.");
                return;
            }

            if (id) {
                // Edit
                const index = books.findIndex(b => b.id === id);
                if (index !== -1) {
                    books[index] = { id, name, pages };
                    showToast("Book updated successfully!");
                }
            } else {
                // Add
                const newId = Date.now().toString();
                books.push({ id: newId, name, pages });
                currentBookId = newId; // Select the new book automatically
                showToast("Book added successfully!");
            }

            saveData();
            renderSelect();
            resetForm();
        });

        // Select Change
        bookSelect.addEventListener('change', (e) => {
            currentBookId = e.target.value;
            const selectedBook = books.find(b => b.id === currentBookId);
            
            if (selectedBook) {
                // Populate form for editing
                bookIdInput.value = selectedBook.id;
                bookNameInput.value = selectedBook.name;
                bookPagesInput.value = selectedBook.pages;
                
                saveBookBtn.textContent = 'Update Book';
                cancelEditBtn.classList.remove('hidden');
                deleteBookBtn.classList.remove('hidden');

                pickPageBtn.disabled = false;
                pickPageBtn.classList.add('pulse-anim');
                resetDisplay();
            }
        });

        // Cancel Edit
        cancelEditBtn.addEventListener('click', () => {
            resetForm();
            // Deselect in dropdown if we are cancelling edit
            bookSelect.value = '';
            currentBookId = null;
            pickPageBtn.disabled = true;
            pickPageBtn.classList.remove('pulse-anim');
            resetDisplay();
        });

        // Delete Book
        deleteBookBtn.addEventListener('click', () => {
            const id = bookIdInput.value;
            if (id && confirm("Are you sure you want to delete this book?")) {
                books = books.filter(b => b.id !== id);
                if (currentBookId === id) {
                    currentBookId = null;
                }
                saveData();
                renderSelect();
                resetForm();
                showToast("Book deleted.");
            }
        });

        // Pick Page Logic
        pickPageBtn.addEventListener('click', () => {
            if (!currentBookId) return;
            const book = books.find(b => b.id === currentBookId);
            if (!book) return;

            pickPageBtn.disabled = true;
            pickPageBtn.classList.remove('pulse-anim');
            
            // Animation effect
            pageDisplay.classList.add('animating');
            resultLabel.textContent = 'Selecting...';
            
            let counter = 0;
            const interval = setInterval(() => {
                pageDisplay.textContent = Math.floor(Math.random() * book.pages) + 1;
                counter++;
                if (counter > 15) { // 15 cycles
                    clearInterval(interval);
                    const finalPage = Math.floor(Math.random() * book.pages) + 1;
                    pageDisplay.textContent = finalPage;
                    pageDisplay.classList.remove('animating');
                    resultLabel.textContent = `Selected from: ${book.name}`;
                    pickPageBtn.disabled = false;
                    pickPageBtn.classList.add('pulse-anim');
                }
            }, 50);
        });

        // Export JSON
        exportBtn.addEventListener('click', () => {
            if (books.length === 0) {
                showToast("No data to export!");
                return;
            }
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(books, null, 2));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", "book_page_selector_backup.json");
            document.body.appendChild(downloadAnchorNode); // required for firefox
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
            showToast("Export successful!");
        });

        // Import JSON
        importFile.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                try {
                    const importedData = JSON.parse(event.target.result);
                    if (Array.isArray(importedData)) {
                        books = importedData;
                        saveData();
                        currentBookId = null;
                        renderSelect();
                        resetForm();
                        showToast("Data imported successfully!");
                    } else {
                        showToast("Invalid data format!");
                    }
                } catch (err) {
                    console.error(err);
                    showToast("Failed to read JSON file!");
                }
            };
            reader.readAsText(file);
            // Reset input so the same file can be selected again
            importFile.value = '';
        });
    }

    // --- Remove existing Service Workers ---
    function unregisterServiceWorker() {
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(registrations) {
                for(let registration of registrations) {
                    registration.unregister();
                }
            });
        }
    }
});

</script>
</body>
</html>
